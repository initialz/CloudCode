name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.1.0) for manual run; tag must already exist'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_suffix: linux-aarch64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_suffix: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build admin-ui bundle
        run: |
          cd admin-ui
          npm ci
          npm run build

      - name: Build webterm bundle
        run: |
          cd webterm
          pnpm install --frozen-lockfile
          pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        # Explicit server binaries only — NOT --workspace — so the eframe GUI
        # app (cloudcode-app) is never built on the musl server targets, where
        # its winit/GUI system deps don't exist. The desktop app ships via the
        # separate macOS .app/.dmg job below.
        run: cargo build --release --target ${{ matrix.target }} -p cloudcode-hub -p cloudcode-agent -p cloudcode-client

      - name: Package
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          NAME="cloudcode-${TAG}-${SUFFIX}"
          mkdir -p "dist/${NAME}"
          cp "target/${TARGET}/release/cloudcode-hub"   "dist/${NAME}/"
          cp "target/${TARGET}/release/cloudcode-agent" "dist/${NAME}/"
          cp "target/${TARGET}/release/cloudcode"       "dist/${NAME}/"
          cp hub.example.toml agent.example.toml "dist/${NAME}/"
          tar -czf "${NAME}.tar.gz" -C dist "${NAME}"
          (cd dist && sha256sum "${NAME}/cloudcode-hub" "${NAME}/cloudcode-agent" "${NAME}/cloudcode" > "../${NAME}.sha256" || \
            shasum -a 256 "${NAME}/cloudcode-hub" "${NAME}/cloudcode-agent" "${NAME}/cloudcode" > "../${NAME}.sha256")

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            cloudcode-*.tar.gz
            cloudcode-*.sha256
          fail_on_unmatched_files: true

  # Desktop GUI app — packaged separately as a macOS .app/.dmg (Apple Silicon).
  # Not built on the musl server targets above (eframe needs system GUI libs).
  # Unsigned/unnotarized (no cert): first launch needs a Gatekeeper bypass —
  # see the desktop-app section of README.md.
  package-macos-app:
    name: macOS desktop app (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Generate icon.icns from placeholder PNG
        run: |
          set -euo pipefail
          mkdir -p icon.iconset
          sips -z 16 16   crates/app/assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32   crates/app/assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32   crates/app/assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64   crates/app/assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 crates/app/assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 crates/app/assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 crates/app/assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 crates/app/assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 crates/app/assets/icon.png --out icon.iconset/icon_512x512.png
          cp crates/app/assets/icon.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o crates/app/assets/icon.icns

      - name: Bundle .app
        run: cargo bundle --release -p cloudcode-app

      - name: Create .dmg
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          APP="target/release/bundle/osx/CloudCode.app"
          test -d "$APP" || { echo "bundle not found at $APP"; ls -R target/release/bundle || true; exit 1; }
          DMG="CloudCode-${TAG}-macos-aarch64.dmg"
          hdiutil create -volname "CloudCode" -srcfolder "$APP" -ov -format UDZO "$DMG"
          shasum -a 256 "$DMG" > "${DMG}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            CloudCode-*.dmg
            CloudCode-*.dmg.sha256
          fail_on_unmatched_files: true
