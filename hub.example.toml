# Cloudcode Hub 配置示例
# 一次性初始化：cloudcode-hub --init --config hub.toml
#
# 启动（前台，日志到 stdout）：cloudcode-hub --config hub.toml
# 启动（守护）：             cloudcode-hub daemon start --config hub.toml

[server]
# 对外监听地址。生产配在反向代理后（nginx/caddy + TLS），代理转发到 127.0.0.1:7000。
listen = "0.0.0.0:7000"
audit_log = "./audit.jsonl"

# Agent 槽位。每个槽位代表一台允许连入的 agent；
# agent 通过出站 WebSocket 连接 /v1/agent/ws，并在 hello 帧上报 (name, plaintext secret)。
# secret 必须 argon2 verify 出与 `shared_secret_hash` 一致，且 name 与本条匹配。
# 同 name 多连接：先到先得，后到的会被拒。
# [[agents]]
# name = "peter-mbp"
# shared_secret_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."

# 账号：通过 `cloudcode-hub gen-token <name>` 生成 token 与 hash。
# allowed_agents: 该账号能 dispatch task 的 agent 列表，POST /v1/tasks 不显式带 `agent`
#                 时按本顺序选第一个在线的；显式带 `agent` 则必须在本列表中。
[[accounts]]
name = "alice"
token_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."
allowed_agents = []

# [[accounts]]
# name = "bob"
# token_hash = "$argon2id$..."
# allowed_agents = ["peter-mbp"]
